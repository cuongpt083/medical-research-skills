version: "0.5"

CapabilityRequest:
  request_id: string
  capability: string
  query:
    text: string
    structured_terms: [string]
  filters:
    date_from: string|null
    date_to: string|null
    language: [string]
    publication_types: [string]
  pagination:
    cursor: string|null
    page_size: integer
  context:
    research_case_id: string
    intent: string

ProviderResultEnvelope:
  request_id: string
  provider: string
  capability: string
  retrieved_at: string
  cache:
    hit: boolean
    key: string
  pagination:
    next_cursor: string|null
  records: [NormalizedRecord]
  warnings: [string]

NormalizedRecord:
  record_id: string
  identifiers:
    doi: string|null
    pmid: string|null
    pmcid: string|null
    openalex_id: string|null
    semantic_scholar_id: string|null
    clinicaltrials_gov_id: string|null
  bibliographic:
    title: string
    authors: [string]
    abstract: string|null
    journal: string|null
    publication_date: string|null
    publication_types: [string]
    language: string|null
  links:
    canonical_url: string|null
    fulltext_urls: [string]
    pdf_urls: [string]
  graph:
    cited_by_count: integer|null
    references: [string]
    citations: [string]
  status:
    peer_reviewed: boolean|null
    preprint: boolean|null
    retracted: boolean|null
    corrected: boolean|null
  provenance:
    provider: string
    retrieved_at: string
    request_id: string
    query_hash: string
    raw_record_locator: string|null
